name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.4.1-stable

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            godot
            ~/.godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}

      - name: Install Godot editor
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/$GODOT_VERSION/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot
          chmod +x godot
          rm "Godot_v${GODOT_VERSION}_linux.x86_64.zip"

      - name: Install export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/$GODOT_VERSION/Godot_v${GODOT_VERSION}_export_templates.tpz" -O /tmp/templates.tpz
          mkdir -p ~/.godot/export_templates
          unzip -q /tmp/templates.tpz -d ~/.godot/export_templates
          mv ~/.godot/export_templates/templates ~/.godot/export_templates/4.4.1.stable
          rm /tmp/templates.tpz

      - name: Import resources
        run: |
          ./godot --headless --path . --import 2>&1
        timeout-minutes: 30

      - name: Godot HTML5 export
        run: |
          ./godot --headless --path . --export-release "HTML5" builds/web/index.html 2>&1
        timeout-minutes: 15

      - name: Patch PWA
        run: bash scripts/patch_pwa.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
