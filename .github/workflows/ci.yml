name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python syntax check
        run: |
          find scripts/ -name "*.py" -exec python3 -m py_compile {} +

      - name: Shell lint
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts

      - name: Check project.godot exists
        run: test -f project.godot

      - name: GDScript check
        run: |
          if command -v godot &> /dev/null; then
            godot --headless --path . --check-only --script res://scripts/autoload/game_state.gd
          else
            echo "Godot not available — skipping GDScript check"
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Godot HTML5 export
        if: github.ref == 'refs/heads/main'
        run: |
          if command -v godot &> /dev/null; then
            godot --headless --path . --export-release "HTML5" builds/web/index.html
            echo "Export exit code: $?"
          else
            echo "Godot not available — skipping export"
            exit 0
          fi
        timeout-minutes: 15

      - name: Verify export artifacts
        if: github.ref == 'refs/heads/main'
        run: |
          failures=0
          for f in builds/web/index.html builds/web/*.wasm builds/web/*.pck builds/web/*.js; do
            if [ -f "$f" ]; then
              echo "OK: $f ($(stat -c%s "$f") bytes)"
            else
              echo "MISSING: $f"
              failures=$((failures + 1))
            fi
          done
          if [ "$failures" -gt 0 ]; then exit 1; fi

      - name: Patch PWA
        if: github.ref == 'refs/heads/main'
        run: bash scripts/patch_pwa.sh

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Serve build directory
        run: |
          python3 -m http.server 8080 --directory builds/web &
          sleep 2
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/

      - name: Run Lighthouse CI
        run: |
          npx @lhci/cli@0.14.x autorun --config=lighthouserc.json || echo "Lighthouse audit completed (non-fatal)"
        timeout-minutes: 5
