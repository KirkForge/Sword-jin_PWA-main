name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.4.1-stable

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python syntax check
        run: |
          find scripts/ -name "*.py" -exec python3 -m py_compile {} +

      - name: Shell lint
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts

      - name: Check project.godot exists
        run: test -f project.godot

      - name: Install gdtoolkit
        run: pip install gdtoolkit

      - name: GDScript lint
        run: |
          gdformat --check $(find . -name "*.gd" -not -path "./addons/*")
          gdlint $(find . -name "*.gd" -not -path "./addons/*")

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}

      - name: Install Godot editor
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/$GODOT_VERSION/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot
          chmod +x godot
          rm "Godot_v${GODOT_VERSION}_linux.x86_64.zip"

      - name: Install export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/$GODOT_VERSION/Godot_v${GODOT_VERSION}_export_templates.tpz" -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates
          unzip -q /tmp/templates.tpz -d ~/.local/share/godot/export_templates
          mv ~/.local/share/godot/export_templates/templates ~/.local/share/godot/export_templates/4.4.1.stable
          rm /tmp/templates.tpz

      - name: Import resources
        run: |
          ./godot --headless --path . --import 2>&1
        timeout-minutes: 30

      - name: Run GUT unit tests
        run: |
          ./godot --headless --path . -s addons/gut/gut_cmdln.gd -gdir=res://test -gexit
        timeout-minutes: 5

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}

      - name: Install Godot editor
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/$GODOT_VERSION/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot
          chmod +x godot
          rm "Godot_v${GODOT_VERSION}_linux.x86_64.zip"

      - name: Install export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/$GODOT_VERSION/Godot_v${GODOT_VERSION}_export_templates.tpz" -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates
          unzip -q /tmp/templates.tpz -d ~/.local/share/godot/export_templates
          mv ~/.local/share/godot/export_templates/templates ~/.local/share/godot/export_templates/4.4.1.stable
          rm /tmp/templates.tpz

      - name: Import resources
        run: |
          ./godot --headless --path . --import 2>&1
        timeout-minutes: 30

      - name: Godot HTML5 export
        run: |
          ./godot --headless --path . --export-release "HTML5" builds/web/index.html 2>&1
        timeout-minutes: 15

      - name: Godot headless smoke test
        run: |
          export GODOT_BIN=./godot
          bash scripts/ci/smoke_test.sh
        timeout-minutes: 6

      - name: Verify export artifacts
        run: |
          failures=0
          for f in builds/web/index.html builds/web/*.wasm builds/web/*.pck builds/web/*.js; do
            if [ -f "$f" ]; then
              echo "OK: $f ($(stat -c%s "$f") bytes)"
            else
              echo "MISSING: $f"
              failures=$((failures + 1))
            fi
          done
          if [ "$failures" -gt 0 ]; then exit 1; fi

      - name: Patch PWA
        run: bash scripts/patch_pwa.sh

      - name: Upload web build to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: builds/web

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Serve build directory
        run: |
          python3 -m http.server 8080 --directory builds/web &
          sleep 2
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/

      - name: Run Lighthouse CI
        run: |
          npx @lhci/cli@0.14.x autorun --config=lighthouserc.json
        timeout-minutes: 5
