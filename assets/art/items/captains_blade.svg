<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g id="captains_blade" stroke-linecap="round" stroke-linejoin="round">
    <!-- Blade -->
    <path d="M30 2 L34 4 L35 28 L30 30 L25 28 L26 4 Z" fill="#E0E8F0" stroke="#C0C8D0" stroke-width="1"/>
    <!-- Edge highlight -->
    <line x1="30" y1="4" x2="30" y2="28" stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.5"/>
    <!-- Fuller (groove) -->
    <line x1="30" y1="8" x2="30" y2="26" stroke="#B0B8C0" stroke-width="1.5"/>
    <!-- Guard (ornate, gold) -->
    <path d="M18 31 L24 29 L30 32 L36 29 L42 31 L42 35 L36 33 L30 36 L24 33 L18 35 Z" fill="#FFD700" stroke="#B8960F" stroke-width="1"/>
    <!-- Handle -->
    <rect x="28" y="36" width="4" height="14" rx="1" fill="#604020" stroke="#402010" stroke-width="1"/>
    <!-- Grip wrap -->
    <line x1="28" y1="39" x2="32" y2="39" stroke="#FFD700" stroke-width="0.75"/>
    <line x1="28" y1="42" x2="32" y2="42" stroke="#FFD700" stroke-width="0.75"/>
    <line x1="28" y1="45" x2="32" y2="45" stroke="#FFD700" stroke-width="0.75"/>
    <!-- Pommel (gold) -->
    <ellipse cx="30" cy="54" rx="4" ry="3" fill="#FFD700" stroke="#B8960F" stroke-width="1"/>
  </g>
</svg>