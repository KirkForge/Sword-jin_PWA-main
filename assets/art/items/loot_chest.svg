<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Chest / Loot crate -->
  <defs>
    <linearGradient id="chWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b4513"/>
      <stop offset="50%" stop-color="#a0522d"/>
      <stop offset="100%" stop-color="#5c3317"/>
    </linearGradient>
    <linearGradient id="chGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <!-- Back wall -->
  <path d="M10 20 L32 10 L54 20 L54 44 L32 54 L10 44 Z" fill="#5c3317"/>
  <!-- Front lid (open) -->
  <path d="M10 20 L32 30 L54 20 L32 10 Z" fill="url(#chWood)"/>
  <rect x="10" y="20" width="44" height="24" fill="url(#chWood)"/>
  <!-- Gold trim -->
  <rect x="10" y="20" width="44" height="4" fill="url(#chGold)"/>
  <rect x="10" y="36" width="44" height="4" fill="url(#chGold)"/>
  <!-- Lock -->
  <rect x="28" y="26" width="8" height="10" rx="1" fill="url(#chGold)"/>
  <circle cx="32" cy="31" r="2" fill="#8b4513"/>
  <!-- Glow from inside -->
  <ellipse cx="32" cy="18" rx="12" ry="6" fill="#ffd700" opacity="0.3"/>
</svg>