<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Greatsword weapon -->
  <defs>
    <linearGradient id="gsBlade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="40%" stop-color="#c0c0c0"/>
      <stop offset="70%" stop-color="#a9a9a9"/>
      <stop offset="100%" stop-color="#696969"/>
    </linearGradient>
    <linearGradient id="gsEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="50%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#4682b4"/>
    </linearGradient>
  </defs>
  <g transform="rotate(-15,32,32)">
    <path d="M28 4 L36 4 L34 42 L30 42 Z" fill="url(#gsBlade)"/>
    <path d="M28 4 L32 4 L32 42 L30 42 Z" fill="url(#gsEdge)" opacity="0.6"/>
    <!-- Fuller -->
    <rect x="31" y="6" width="2" height="34" fill="#333" opacity="0.3"/>
    <!-- Guard -->
    <rect x="22" y="42" width="20" height="5" rx="1" fill="#b8860b"/>
    <rect x="24" y="44" width="16" height="2" fill="#8b4513"/>
    <!-- Grip -->
    <rect x="30" y="47" width="6" height="14" fill="#4a3b2a"/>
    <rect x="30" y="47" width="6" height="14" fill="none" stroke="#2a1f15" stroke-width="0.5"/>
    <!-- Pommel -->
    <circle cx="33" cy="63" r="3.5" fill="#b8860b"/>
    <rect x="31" y="61" width="4" height="4" fill="#8b4513"/>
  </g>
</svg>