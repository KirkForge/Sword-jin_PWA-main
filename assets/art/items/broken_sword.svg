    <circle cx="26" cy="14" r="2" fill="#8B2500" stroke="none"/>
    <circle cx="28" cy="24" r="1.5" fill="#8B2500" stroke="none"/>
    <circle cx="23" cy="20" r="1" fill="#8B2500" stroke="none"/>
    <!-- Guard -->
    <rect x="18" y="36" width="16" height="4" rx="1" fill="#604020" stroke="#402010" stroke-width="1"/>
    <!-- Handle -->
    <line x1="26" y1="40" x2="26" y2="56" stroke="#604020" stroke-width="4"/>
    <!-- Pommel -->
