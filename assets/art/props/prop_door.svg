<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Door / portal environment prop -->
  <defs>
    <linearGradient id="doorWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="50%" stop-color="#4e342e"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
    <radialGradient id="doorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00bfff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00bfff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Stone arch -->
  <rect x="6" y="8" width="52" height="56" rx="4" fill="#424242"/>
  <!-- Inner opening -->
  <path d="M14 16 L50 16 L50 50 C50 58, 14 58, 14 50 Z" fill="url(#doorGlow)"/>
  <!-- Door frame -->
  <rect x="18" y="14" width="28" height="46" rx="2" fill="url(#doorWood)"/>
  <!-- Iron bands -->
  <rect x="16" y="20" width="32" height="4" fill="#696969"/>
  <rect x="16" y="36" width="32" height="4" fill="#696969"/>
  <rect x="16" y="52" width="32" height="4" fill="#696969"/>
  <!-- Handle -->
  <circle cx="24" cy="30" r="3" fill="#daa520"/>
  <rect x="24" y="30" width="4" height="8" fill="#daa520"/>
  <!-- Keyhole -->
  <circle cx="24" cy="46" r="2" fill="#222"/>
  <rect x="23" y="46" width="2" height="4" fill="#222"/>
</svg>