<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Stone/dungeon wall tile -->
  <defs>
    <linearGradient id="stoneBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="stoneBlock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#757575"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" fill="url(#stoneBase)"/>
  <!-- Mortar lines -->
  <!-- Row 1 -->
  <rect x="0" y="0" width="30" height="14" fill="url(#stoneBlock)" rx="1"/>
  <rect x="34" y="0" width="30" height="14" fill="url(#stoneBlock)" rx="1"/>
  <!-- Row 2 -->
  <rect x="16" y="18" width="32" height="14" fill="url(#stoneBlock)" rx="1"/>
  <rect x="0" y="18" width="12" height="14" fill="url(#stoneBlock)" rx="1"/>
  <rect x="52" y="18" width="12" height="14" fill="url(#stoneBlock)" rx="1"/>
  <!-- Row 3 -->
  <rect x="0" y="36" width="26" height="14" fill="url(#stoneBlock)" rx="1"/>
  <rect x="30" y="36" width="34" height="14" fill="url(#stoneBlock)" rx="1"/>
  <!-- Row 4 -->
  <rect x="8" y="54" width="48" height="10" fill="url(#stoneBlock)" rx="1"/>
  <rect x="0" y="54" width="6" height="10" fill="url(#stoneBlock)" rx="1"/>
  <rect x="58" y="54" width="6" height="10" fill="url(#stoneBlock)" rx="1"/>
</svg>