<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Death / skull marker -->
  <defs>
    <radialGradient id="deathGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="28" fill="url(#deathGlow)" stroke="#8b0000" stroke-width="2"/>
  <!-- Skull -->
  <circle cx="32" cy="24" r="10" fill="#e8e8e8"/>
  <rect x="26" y="22" width="4" height="5" rx="1" fill="#222"/>
  <rect x="34" y="22" width="4" height="5" rx="1" fill="#222"/>
  <polygon points="28,30 32,34 36,30" fill="#222"/>
  <!-- Crossbones -->
  <line x1="12" y1="44" x2="52" y2="44" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="32" y1="34" x2="32" y2="54" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <!-- Bone ends -->
  <circle cx="12" cy="44" r="4" fill="#e8e8e8"/>
  <circle cx="52" cy="44" r="4" fill="#e8e8e8"/>
  <circle cx="32" cy="34" r="4" fill="#e8e8e8"/>
  <circle cx="32" cy="54" r="4" fill="#e8e8e8"/>
</svg>