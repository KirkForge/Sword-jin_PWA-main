<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield block / parry effect -->
  <defs>
    <linearGradient id="shieldFx" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="50%" stop-color="#4682b4"/>
      <stop offset="100%" stop-color="#1a3a5a"/>
    </linearGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0ffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#87ceeb" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="26" fill="url(#shieldGlow)"/>
  <!-- Hexagonal shield burst -->
  <polygon points="32,6 52,18 52,42 32,54 12,42 12,18" fill="none" stroke="url(#shieldFx)" stroke-width="3" opacity="0.8"/>
  <polygon points="32,10 48,20 48,40 32,50 16,40 16,20" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <!-- Impact sparks -->
  <line x1="32" y1="6" x2="32" y2="0" stroke="#fff" stroke-width="2"/>
  <line x1="52" y1="18" x2="58" y2="14" stroke="#fff" stroke-width="2"/>
  <line x1="52" y1="42" x2="58" y2="46" stroke="#fff" stroke-width="2"/>
  <line x1="32" y1="54" x2="32" y2="64" stroke="#fff" stroke-width="2"/>
  <line x1="12" y1="42" x2="4" y2="48" stroke="#fff" stroke-width="2"/>
  <line x1="12" y1="18" x2="4" y2="12" stroke="#fff" stroke-width="2"/>
  <!-- Block text -->
  <text x="32" y="35" font-family="Arial Black,sans-serif" font-weight="900" font-size="8" fill="#fff" text-anchor="middle">BLOCK</text>
</svg>