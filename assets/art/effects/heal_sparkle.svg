<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <g id="heal_sparkle" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer glow -->
    <circle cx="16" cy="16" r="8" fill="#20A020" opacity="0.25"/>
    <!-- Inner burst -->
    <circle cx="16" cy="16" r="4" fill="#40FF40" opacity="0.6"/>
    <!-- Core -->
    <circle cx="16" cy="16" r="2" fill="#FFFFFF" opacity="0.85"/>
    <!-- Cross sparkle -->
    <line x1="16" y1="3" x2="16" y2="9" stroke="#40FF40" stroke-width="1.5" opacity="0.8"/>
    <line x1="16" y1="23" x2="16" y2="29" stroke="#40FF40" stroke-width="1.5" opacity="0.8"/>
    <line x1="3" y1="16" x2="9" y2="16" stroke="#40FF40" stroke-width="1.5" opacity="0.8"/>
    <line x1="23" y1="16" x2="29" y2="16" stroke="#40FF40" stroke-width="1.5" opacity="0.8"/>
    <!-- Diagonal sparkle dots -->
    <circle cx="8" cy="8" r="1.5" fill="#40FF40" opacity="0.5"/>
    <circle cx="24" cy="8" r="1.5" fill="#40FF40" opacity="0.5"/>
    <circle cx="8" cy="24" r="1.5" fill="#40FF40" opacity="0.5"/>
    <circle cx="24" cy="24" r="1.5" fill="#40FF40" opacity="0.5"/>
  </g>
</svg>