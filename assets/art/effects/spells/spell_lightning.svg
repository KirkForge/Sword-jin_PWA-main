<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Lightning bolt spell -->
  <defs>
    <linearGradient id="ltBolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="40%" stop-color="#e0ffff"/>
      <stop offset="70%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#00bfff"/>
    </linearGradient>
  </defs>
  <!-- Glow aura -->
  <ellipse cx="32" cy="32" rx="24" ry="28" fill="#87ceeb" opacity="0.2"/>
  <!-- Main bolt -->
  <polygon points="36,2 20,28 32,28 28,62 48,32 36,32" fill="url(#ltBolt)"/>
  <!-- Inner white core -->
  <polygon points="34,8 24,26 30,26 28,54 42,34 36,34" fill="#fff" opacity="0.8"/>
  <!-- Sparks -->
  <circle cx="18" cy="12" r="2" fill="#fff"/>
  <circle cx="48" cy="18" r="1.5" fill="#87ceeb"/>
  <circle cx="14" cy="42" r="1.5" fill="#fff"/>
  <circle cx="52" cy="48" r="2" fill="#e0ffff"/>
</svg>