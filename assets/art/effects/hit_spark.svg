<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <g id="hit_spark" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer glow -->
    <circle cx="16" cy="16" r="8" fill="#FF8020" opacity="0.3"/>
    <!-- Inner burst -->
    <circle cx="16" cy="16" r="4" fill="#FFE040" opacity="0.8"/>
    <!-- Core -->
    <circle cx="16" cy="16" r="2" fill="#FFFFFF" opacity="0.9"/>
    <!-- Rays -->
    <line x1="16" y1="2" x2="16" y2="8" stroke="#FFE040" stroke-width="1.5" opacity="0.7"/>
    <line x1="16" y1="24" x2="16" y2="30" stroke="#FFE040" stroke-width="1.5" opacity="0.7"/>
    <line x1="2" y1="16" x2="8" y2="16" stroke="#FFE040" stroke-width="1.5" opacity="0.7"/>
    <line x1="24" y1="16" x2="30" y2="16" stroke="#FFE040" stroke-width="1.5" opacity="0.7"/>
    <!-- Diagonal rays -->
    <line x1="6" y1="6" x2="10" y2="10" stroke="#FF8020" stroke-width="1" opacity="0.5"/>
    <line x1="22" y1="6" x2="26" y2="2" stroke="#FF8020" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="26" x2="10" y2="22" stroke="#FF8020" stroke-width="1" opacity="0.5"/>
    <line x1="22" y1="22" x2="26" y2="26" stroke="#FF8020" stroke-width="1" opacity="0.5"/>
  </g>
</svg>