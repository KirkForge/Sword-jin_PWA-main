<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Poison status (skull with bubbling green) -->
  <defs>
    <linearGradient id="poisonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7fff00"/>
      <stop offset="60%" stop-color="#32cd32"/>
      <stop offset="100%" stop-color="#006400"/>
    </linearGradient>
  </defs>
  <!-- Skull base -->
  <path d="M8 10 C8 4, 24 4, 24 10 L24 16 C24 20, 20 22, 18 22 L14 22 C12 22, 8 20, 8 16 Z" fill="url(#poisonGrad)"/>
  <!-- Eyes -->
  <rect x="10" y="12" width="5" height="5" rx="1.5" fill="#1a1a1a"/>
  <rect x="17" y="12" width="5" height="5" rx="1.5" fill="#1a1a1a"/>
  <!-- Nose hole -->
  <polygon points="14,18 16,20 18,18" fill="#1a1a1a"/>
  <!-- Teeth -->
  <rect x="12" y="20" width="2" height="4" fill="#1a1a1a"/>
  <rect x="15" y="20" width="2" height="4" fill="#1a1a1a"/>
  <rect x="18" y="20" width="2" height="4" fill="#1a1a1a"/>
  <!-- Bubbles -->
  <circle cx="6" cy="8" r="2" fill="#7fff00" opacity="0.6"/>
  <circle cx="26" cy="6" r="3" fill="#7fff00" opacity="0.5"/>
  <circle cx="4" cy="14" r="1.5" fill="#32cd32" opacity="0.5"/>
  <circle cx="28" cy="12" r="2" fill="#32cd32" opacity="0.6"/>
</svg>