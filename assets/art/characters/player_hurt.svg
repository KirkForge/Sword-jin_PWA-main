<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g id="player_hurt">
    <!-- Red flash overlay (applied to whole sprite) -->
    <!-- Hair -->
    <path d="M28,8 L36,8 L38,14 L26,14 Z" fill="#644020"/>
    <path d="M30,8 L34,8 L35,12 L29,12 Z" fill="#8C5028"/>
    <!-- Face (grimacing) -->
    <rect x="28" y="14" width="8" height="8" rx="1" fill="#DCB48C"/>
    <rect x="28" y="18" width="8" height="4" fill="#BE966E"/>
    <!-- Eyes (pain) -->
    <path d="M30,16 L32,18 L30,18 Z" fill="#1A1A2E"/>
    <path d="M34,16 L36,18 L34,18 Z" fill="#1A1A2E"/>
    <!-- Mouth (open grimace) -->
    <rect x="31" y="20" width="4" height="2" rx="0.5" fill="#3C2D1E"/>
    <!-- Tunic (knocked back) -->
    <path d="M24,22 L40,22 L42,38 L22,38 Z" fill="#3250A0"/>
    <path d="M26,22 L38,22 L39,36 L25,36 Z" fill="#1E3B78"/>
    <!-- Belt -->
    <rect x="24" y="34" width="16" height="3" fill="#3C2D1E"/>
    <rect x="30" y="34" width="4" height="3" fill="#B4A078"/>
    <!-- Arms (thrown back) -->
    <rect x="16" y="24" width="4" height="12" rx="1" fill="#3250A0"/>
    <rect x="44" y="24" width="4" height="12" rx="1" fill="#1E3B78"/>
    <!-- Hands -->
    <rect x="16" y="34" width="4" height="3" rx="1" fill="#DCB48C"/>
    <rect x="44" y="34" width="4" height="3" rx="1" fill="#DCB48C"/>
    <!-- Sword (dropped) -->
    <g id="sword_dropped" transform="rotate(30,48,52)">
      <rect x="47" y="44" width="2" height="14" fill="#C8C8D2"/>
      <rect x="46" y="56" width="4" height="2" fill="#3C2D1E"/>
    </g>
    <!-- Legs (off balance) -->
    <rect x="24" y="38" width="5" height="12" fill="#3C2D1E"/>
    <rect x="36" y="38" width="5" height="10" fill="#3C2D1E"/>
    <!-- Boots -->
    <rect x="23" y="48" width="7" height="4" rx="1" fill="#3C2D1E"/>
    <rect x="35" y="46" width="7" height="4" rx="1" fill="#3C2D1E"/>
    <!-- Red accent -->
    <path d="M28,22 L36,22 L36,24 L28,24 Z" fill="#A02828"/>
    <!-- Red flash overlay -->
    <rect x="24" y="8" width="16" height="48" rx="2" fill="#E04040" opacity="0.25"/>
    <!-- Impact stars -->
    <path d="M18,12 L20,16 L22,12 L20,14 Z" fill="#FFD700" opacity="0.8"/>
    <path d="M42,10 L44,14 L46,10 L44,12 Z" fill="#FFD700" opacity="0.8"/>
  </g>
</svg>