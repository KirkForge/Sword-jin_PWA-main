<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g id="player_walk">
    <!-- Hair -->
    <path d="M28,8 L36,8 L38,14 L26,14 Z" fill="#644020"/>
    <path d="M30,8 L34,8 L35,12 L29,12 Z" fill="#8C5028"/>
    <!-- Face -->
    <rect x="28" y="14" width="8" height="8" rx="1" fill="#DCB48C"/>
    <rect x="28" y="18" width="8" height="4" fill="#BE966E"/>
    <!-- Eyes -->
    <rect x="30" y="16" width="2" height="2" fill="#1A1A2E"/>
    <rect x="34" y="16" width="2" height="2" fill="#1A1A2E"/>
    <!-- Tunic -->
    <path d="M24,22 L40,22 L42,38 L22,38 Z" fill="#3250A0"/>
    <path d="M26,22 L38,22 L39,36 L25,36 Z" fill="#1E3B78"/>
    <!-- Belt -->
    <rect x="24" y="34" width="16" height="3" fill="#3C2D1E"/>
    <rect x="30" y="34" width="4" height="3" fill="#B4A078"/>
    <!-- Left arm (swinging back) -->
    <rect x="20" y="24" width="4" height="12" rx="1" fill="#3250A0"/>
    <rect x="20" y="34" width="4" height="3" rx="1" fill="#DCB48C"/>
    <!-- Right arm (swinging forward) -->
    <rect x="40" y="20" width="4" height="14" rx="1" fill="#1E3B78"/>
    <rect x="40" y="32" width="4" height="3" rx="1" fill="#DCB48C"/>
    <!-- Sword (carried, angled) -->
    <g id="sword">
      <line x1="42" y1="32" x2="48" y2="48" stroke="#C8C8D2" stroke-width="2" stroke-linecap="round"/>
      <line x1="42" y1="32" x2="43" y2="28" stroke="#F0F0FA" stroke-width="2" stroke-linecap="round"/>
      <circle cx="42" cy="34" r="2" fill="#3C2D1E"/>
    </g>
    <!-- Left leg (back stride) -->
    <rect x="22" y="38" width="5" height="12" fill="#3C2D1E"/>
    <rect x="21" y="48" width="7" height="4" rx="1" fill="#3C2D1E"/>
    <!-- Right leg (forward stride) -->
    <rect x="34" y="38" width="5" height="10" fill="#3C2D1E"/>
    <rect x="33" y="46" width="7" height="4" rx="1" fill="#3C2D1E"/>
    <!-- Red accent -->
    <path d="M28,22 L36,22 L36,24 L28,24 Z" fill="#A02828"/>
  </g>
</svg>