<svg viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Dialogue / speech bubble -->
  <defs>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="44" height="24" rx="6" fill="url(#bubbleGrad)" stroke="#ddd" stroke-width="1.5"/>
  <!-- Tail -->
  <polygon points="20,26 24,32 28,26" fill="url(#bubbleGrad)" stroke="#ddd" stroke-width="1.5" stroke-linejoin="round"/>
  <polygon points="21.5,26.5 24,30.5 26.5,26.5" fill="url(#bubbleGrad)"/>
  <!-- Ellipsis -->
  <circle cx="16" cy="14" r="2" fill="#555"/>
  <circle cx="24" cy="14" r="2" fill="#555"/>
  <circle cx="32" cy="14" r="2" fill="#555"/>
</svg>