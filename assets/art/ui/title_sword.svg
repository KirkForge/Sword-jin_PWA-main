<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" width="256" height="128">
  <g id="title_sword" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left sword blade -->
    <path d="M60 16 L64 14 L68 70 L64 72 L60 70 Z" fill="#D0D8E0" stroke="#808890" stroke-width="1.5"/>
    <line x1="64" y1="18" x2="64" y2="68" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Left guard -->
    <path d="M44 73 L64 76 L84 73 L84 78 L64 81 L44 78 Z" fill="#FFD700" stroke="#B8960F" stroke-width="1"/>
    <!-- Left handle -->
    <rect x="61" y="81" width="6" height="24" rx="1.5" fill="#5080C8" stroke="#305080" stroke-width="1"/>
    <line x1="61" y1="87" x2="67" y2="87" stroke="#FFD700" stroke-width="0.75"/>
    <line x1="61" y1="93" x2="67" y2="93" stroke="#FFD700" stroke-width="0.75"/>
    <line x1="61" y1="99" x2="67" y2="99" stroke="#FFD700" stroke-width="0.75"/>
    <!-- Left pommel -->
    <ellipse cx="64" cy="108" rx="5" ry="4" fill="#FFD700" stroke="#B8960F" stroke-width="1"/>

    <!-- Right sword blade (mirrored) -->
    <path d="M188 16 L192 14 L196 70 L192 72 L188 70 Z" fill="#D0D8E0" stroke="#808890" stroke-width="1.5"/>
    <line x1="192" y1="18" x2="192" y2="68" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Right guard -->
    <path d="M172 73 L192 76 L212 73 L212 78 L192 81 L172 78 Z" fill="#FFD700" stroke="#B8960F" stroke-width="1"/>
    <!-- Right handle -->
    <rect x="189" y="81" width="6" height="24" rx="1.5" fill="#5080C8" stroke="#305080" stroke-width="1"/>
    <line x1="189" y1="87" x2="195" y2="87" stroke="#FFD700" stroke-width="0.75"/>
    <line x1="189" y1="93" x2="195" y2="93" stroke="#FFD700" stroke-width="0.75"/>
    <line x1="189" y1="99" x2="195" y2="99" stroke="#FFD700" stroke-width="0.75"/>
    <!-- Right pommel -->
    <ellipse cx="192" cy="108" rx="5" ry="4" fill="#FFD700" stroke="#B8960F" stroke-width="1"/>

    <!-- Center banner -->
    <path d="M100 52 L128 42 L156 52 L156 62 L128 52 L100 62 Z" fill="#0D1117" stroke="#FFD700" stroke-width="1.5"/>
    <path d="M100 62 L128 52 L156 62 L156 72 L128 62 L100 72 Z" fill="#0D1117" stroke="#FFD700" stroke-width="1.5"/>
    <!-- Banner text area (decorative lines) -->
    <line x1="112" y1="57" x2="144" y2="57" stroke="#FFD700" stroke-width="0.75" stroke-opacity="0.6"/>
    <line x1="116" y1="60" x2="140" y2="60" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.4"/>

    <!-- Decorative sparks -->
    <circle cx="80" cy="30" r="1.5" fill="#FFD700" opacity="0.7"/>
    <circle cx="176" cy="30" r="1.5" fill="#FFD700" opacity="0.7"/>
    <circle cx="128" cy="20" r="2" fill="#FFD700" opacity="0.8"/>
  </g>
</svg>