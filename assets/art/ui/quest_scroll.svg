  <!-- Seal star -->
  <path d="M48 40 L49.5 43 L53 43.5 L50 46 L50.8 49.5 L48 47.5 L45.2 49.5 L46 46 L43 43.5 L46.5 43 Z" fill="#fecaca"/>
