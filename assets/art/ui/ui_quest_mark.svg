<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Quest marker / exclamation -->
  <defs>
    <radialGradient id="questGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#questGlow)"/>
  <polygon points="16,4 18,16 14,16" fill="#ffd700"/>
  <rect x="14" y="20" width="4" height="4" rx="1" fill="#ffd700"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#daa520" stroke-width="2"/>
</svg>