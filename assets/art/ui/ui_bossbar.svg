<svg viewBox="0 0 128 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Boss HP bar frame -->
  <defs>
    <linearGradient id="bossHp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>
    <linearGradient id="bossBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="bossGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="128" height="24" rx="4" fill="url(#bossBg)" stroke="url(#bossGold)" stroke-width="2"/>
  <rect x="3" y="3" width="100" height="18" rx="2" fill="url(#bossHp)"/>
  <text x="64" y="16.5" font-family="Arial,sans-serif" font-weight="bold" font-size="10" fill="#ffd700" text-anchor="middle">DARK KNIGHT — 84%</text>
  <!-- Crown left -->
  <polygon points="8,6 10,2 12,6 14,2 16,6 12,10 10,10" fill="url(#bossGold)"/>
  <!-- Skull right -->
  <circle cx="118" cy="12" r="4" fill="#ffd700"/>
  <rect x="116" y="11" width="1.5" height="2" fill="#222"/>
  <rect x="119" y="11" width="1.5" height="2" fill="#222"/>
</svg>