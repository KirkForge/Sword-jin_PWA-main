<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Spell cooldown radial overlay -->
  <defs>
    <linearGradient id="cdOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="cdRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#4682b4"/>
    </linearGradient>
  </defs>
  <!-- Base circle (the spell icon sits behind this) -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#222" stroke-width="4"/>
  <!-- Dark overlay wedge representing 60% cooldown remaining -->
  <path d="M32 32 L32 4 A28 28 0 0 1 60 32 Z" fill="url(#cdOverlay)"/>
  <path d="M32 32 L60 32 A28 28 0 0 1 32 60 Z" fill="url(#cdOverlay)"/>
  <path d="M32 32 L32 60 A28 28 0 0 1 4 32 Z" fill="url(#cdOverlay)"/>
  <!-- Cooldown ring arc -->
  <path d="M32 4 A28 28 0 0 1 52.6 15.4" fill="none" stroke="url(#cdRing)" stroke-width="3" stroke-linecap="round"/>
  <!-- Timer text -->
  <text x="32" y="37" font-family="Arial Black,sans-serif" font-weight="900" font-size="16" fill="#fff" text-anchor="middle">2.4s</text>
</svg>