<svg viewBox="0 0 128 20" xmlns="http://www.w3.org/2000/svg">
  <!-- Health bar frame -->
  <defs>
    <linearGradient id="hpBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="50%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="hpBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#424242"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="128" height="20" rx="3" fill="url(#hpBg)" stroke="#222" stroke-width="1"/>
  <rect x="2" y="2" width="98" height="16" rx="2" fill="url(#hpBar)"/>
  <!-- Heart icon left -->
  <path d="M6 10 C4 8, 4 5, 6 4 C8 2, 10 4, 10 6 C10 4, 12 2, 14 4 C16 5, 16 8, 14 10 L10 14 Z" fill="#e53935" transform="translate(2,2) scale(0.8)"/>
  <!-- HP text -->
  <text x="64" y="14.5" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#fff" text-anchor="middle">HP 245/250</text>
</svg>