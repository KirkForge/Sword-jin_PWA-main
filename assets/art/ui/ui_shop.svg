<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Shop / merchant tent -->
  <defs>
    <linearGradient id="shTent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d32f2f"/>
      <stop offset="50%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#7f0000"/>
    </linearGradient>
    <linearGradient id="shGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <!-- Ground base -->
  <rect x="4" y="48" width="56" height="12" rx="2" fill="#5d4037"/>
  <!-- Tent body -->
  <path d="M10 48 L32 8 L54 48 Z" fill="url(#shTent)"/>
  <!-- Trim stripes -->
  <path d="M12 44 L32 10 L52 44" fill="none" stroke="url(#shGold)" stroke-width="2"/>
  <path d="M16 40 L32 14 L48 40" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.6"/>
  <!-- Tent opening -->
  <path d="M24 48 L32 20 L40 48 Z" fill="#5d4037"/>
  <!-- Sign post -->
  <rect x="52" y="20" width="3" height="28" fill="#5c3317"/>
  <path d="M46 20 L60 20 L60 30 L46 30 Z" fill="url(#shGold)"/>
  <text x="53" y="28" font-family="Arial,sans-serif" font-weight="bold" font-size="6" fill="#5c3317" text-anchor="middle">$</text>
  <!-- Small wares inside -->
  <rect x="26" y="42" width="4" height="6" fill="#daa520"/>
  <rect x="32" y="40" width="4" height="8" fill="#8b4513"/>
</svg>